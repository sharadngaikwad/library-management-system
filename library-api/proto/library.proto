syntax = "proto3";

package library;

service LibraryService {
  rpc CreateBook (BookCreateRequest) returns (BookResponse);
  rpc UpdateBook (BookUpdateRequest) returns (BookResponse);
  rpc ListBooks (EmptyRequest) returns (ListBooksResponse);
  rpc CreateMember (MemberCreateRequest) returns (MemberResponse);
  rpc UpdateMember (MemberUpdateRequest) returns (MemberResponse);
  rpc ListMembers (EmptyRequest) returns (ListMembersResponse);
  rpc BorrowBook (BorrowRequest) returns (OperationResponse);
  rpc ReturnBook (ReturnRequest) returns (ReturnResponse);
  rpc ListActiveLoans (ListLoansRequest) returns (ListLoansResponse);
}

message BookCreateRequest {
  string title = 1;
  string author = 2;
  string isbn = 3;
  int32 available_copies = 4;
}

message BookUpdateRequest {
  int32 id = 1;
  string title = 2;
  string author = 3;
  string isbn = 4;
  int32 available_copies = 5;
}

message BookResponse {
  int32 id = 1;
  string title = 2;
  string author = 3;
  string isbn = 4;
  int32 available_copies = 5;
}

message MemberCreateRequest {
  string name = 1;
  string email = 2;
  string phone = 3;
}

message MemberUpdateRequest {
    int32 id = 1;
    string name = 2;
    string email = 3;
    string phone = 4;
}

message MemberResponse {
  int32 id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
}

message BorrowRequest {
  int32 member_id = 1;
  int32 book_id = 2;
}

message ReturnRequest {
  int32 member_id = 1;
  int32 book_id = 2;
}

message ReturnResponse {
  string message = 1;
}

message ListLoansRequest {
  int32 member_id = 1; 
}

message OperationResponse {
  int32 id = 1;
  int32 member_id = 2;
  int32 book_id = 3;
  string borrow_date = 4;
  string due_date = 5;
  string return_date = 6;
  BookResponse book = 7;
  MemberResponse member = 8;
}

message ListLoansResponse {
  repeated OperationResponse loans = 1;
}

message EmptyRequest {}

message ListBooksResponse {
    repeated BookResponse books = 1;
}

message ListMembersResponse {
    repeated MemberResponse members = 1;
}
