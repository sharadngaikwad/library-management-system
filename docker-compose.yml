version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d library"]
      interval: 3s
      timeout: 3s
      retries: 5

  library-api:
    build: 
      context: ./library-api
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/library
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy

  library-portal:
    build:
      context: ./library-portal
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_RPC_URL=library-api:50051
    volumes:
      - ./library-api/proto:/library-api/proto  
    depends_on:
      - library-api

volumes:
  postgres_data: